      selector:
        config_entry:
          integration: ha_miwifi
    mac:
      required: true
      example: "AA:BB:CC:DD:EE:FF"
      selector:
        text:
    ip:
      required: true
      example: "192.168.31.77"
      selector:
        text:
    name:
      required: true
      example: "printer"
      selector:
        text:

